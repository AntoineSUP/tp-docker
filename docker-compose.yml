services:
  backend:
    build: ./backend        # chemin vers le Dockerfile du backend
    networks:
      - front-network       # parle à Apache
      - back-network        # parle à la DB
    depends_on:
      database:
        condition: service_healthy  # attend que la DB soit healthy avant de démarrer
    restart: on-failure     # redémarre si le conteneur plante
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]  # ping l'endpoint de santé Spring Boot (wget car curl absent dans Alpine)
      interval: 30s         # vérifie toutes les 30 secondes
      timeout: 10s          # attend max 10s la réponse
      retries: 3            # 3 échecs consécutifs = service unhealthy

  database:
    build: ./database       # chemin vers le Dockerfile de la DB
    networks:
      - back-network        # uniquement accessible par le backend
    environment:            # credentials chargés depuis .env, avec valeurs par défaut
      POSTGRES_DB: ${POSTGRES_DB:-db}
      POSTGRES_USER: ${POSTGRES_USER:-usr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pwd}
    volumes:
      - db-data:/var/lib/postgresql/data  # données persistées sur le disque
    restart: on-failure
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-usr}"]  # vérifie que PostgreSQL accepte les connexions
      interval: 30s
      timeout: 10s
      retries: 3

  httpd:
    build: ./httpd          # chemin vers le Dockerfile d'Apache
    ports:
      - "80:80"             # SEUL port exposé vers le Mac
    networks:
      - front-network       # parle uniquement au backend, pas à la DB
    depends_on:
      backend:
        condition: service_healthy  # attend que le backend soit healthy avant de démarrer
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]  # ping la page d'accueil Apache
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  front-network:            # réseau Apache ↔ Backend
  back-network:             # réseau Backend ↔ Database (DB isolée)

volumes:
  db-data:                  # volume nommé pour persister les données PostgreSQL